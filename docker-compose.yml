version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  gateway:
    build: .
    environment:
      STORE_TYPE: postgres
      STORE_URL: postgres://postgres:postgres@postgres:5432/postgres
      NODE_ENV: production
    depends_on:
      - postgres
    ports:
      - "3100:3100"

volumes:
  pgdata:
