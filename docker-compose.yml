version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  upstream:
    build: .
    command: ["pnpm", "exec", "tsx", "apps/example-basic/src/run-upstream.ts"]
    ports:
      - "3200:3200"

  approver:
    build: .
    command: ["pnpm", "exec", "tsx", "apps/example-basic/src/run-approver.ts"]
    ports:
      - "3300:3300"

  gateway:
    build: .
    environment:
      APPROVALS_DB_URL: postgres://postgres:postgres@postgres:5432/postgres
      APPROVER_WEBHOOK_URL: http://approver:3300/approval-request
    depends_on:
      - postgres
      - approver
      - upstream
    ports:
      - "3100:3100"

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr=0.0.0.0:8181"]
    ports:
      - "8181:8181"
    profiles: ["opa"]

volumes:
  pgdata:
