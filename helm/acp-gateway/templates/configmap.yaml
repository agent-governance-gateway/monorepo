{{- if and .Values.config.enabled .Values.config.data }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "acp-gateway.fullname" . }}-config
  labels:
    {{- include "acp-gateway.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.config.data }}
  {{ $k }}: |
{{ $v | nindent 4 }}
  {{- end }}
{{- end }}
