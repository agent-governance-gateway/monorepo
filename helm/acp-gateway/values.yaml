replicaCount: 1

image:
  repository: ghcr.io/your-org/acp-gateway
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 3100

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: acp-gateway.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

env:
  NODE_ENV: production
  ACP_PORT: "3100"

secretEnv: {}

config:
  enabled: false
  mountPath: /app/config
  data: {}

livenessProbe:
  enabled: true
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  enabled: true
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 10

command: []
args: []
